<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Skipping Rope</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#0f1115;
    font-family:Arial,sans-serif;
    color:white;
}

#ui{
    position:fixed;
    top:15px;
    left:0;
    right:0;
    text-align:center;
    z-index:10;
}

#score{
    font-size:72px;
    font-weight:800;
}

#high{
    opacity:.8;
    margin-top:5px;
}

#msg{
    margin-top:10px;
    height:24px;
    font-weight:bold;
}
</style>

</head>
<body>

<div id="ui">
    <div id="score">0</div>
    <div id="high">High Score: 0</div>
    <div id="msg">Gerakkan HP untuk lompat</div>
</div>

<script src="https://unpkg.com/three@0.179.1/build/three.min.js"></script>

<script>

const scoreEl=document.getElementById("score");
const highEl=document.getElementById("high");
const msgEl=document.getElementById("msg");

let score=0;
let highScore=Number(localStorage.getItem("skip_high")||0);

highEl.textContent="High Score: "+highScore;

function updateScore(){

    scoreEl.textContent=score;

    if(score>highScore){

        highScore=score;

        localStorage.setItem(
            "skip_high",
            String(highScore)
        );

        highEl.textContent=
            "High Score: "+highScore;
    }
}

function showMsg(text){

    msgEl.textContent=text;

    clearTimeout(showMsg.t);

    showMsg.t=setTimeout(()=>{
        msgEl.textContent="";
    },600);
}

const scene=new THREE.Scene();

scene.background=
new THREE.Color(0x0f1115);

const camera=
new THREE.PerspectiveCamera(
    55,
    window.innerWidth/window.innerHeight,
    0.1,
    100
);

camera.position.set(
    0,
    1,
    14
);

const renderer=
new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    Math.min(
        window.devicePixelRatio,
        2
    )
);

document.body.appendChild(
    renderer.domElement
);

scene.add(
    new THREE.HemisphereLight(
        0xffffff,
        0x223344,
        2
    )
);

const dir=
new THREE.DirectionalLight(
    0xffffff,
    2
);

dir.position.set(
    5,
    10,
    8
);

scene.add(dir);

const floor=
new THREE.Mesh(

    new THREE.PlaneGeometry(
        50,
        50
    ),

    new THREE.MeshStandardMaterial({
        color:0x181c22
    })
);

floor.rotation.x=
-Math.PI/2;

floor.position.y=-4.5;

scene.add(floor);

scene.add(
    new THREE.GridHelper(
        50,
        25
    )
);

const ropeMaterial=
new THREE.MeshStandardMaterial({
    color:0xffffff
});

let rope;

function createRope(phase){

    const pts=[];

    const rx=4;
    const ry=5;

    for(
        let i=0;
        i<=180;
        i++
    ){

        const t=
        i/180*Math.PI*2;

        const x=
        Math.sin(t)*rx;

        const y=
        Math.cos(t)*ry;

        const z=
        y*Math.sin(phase);

        pts.push(
            new THREE.Vector3(
                x,
                y*Math.cos(phase),
                z
            )
        );
    }

    const curve=
    new THREE.CatmullRomCurve3(
        pts,
        true
    );

    return new THREE.TubeGeometry(
        curve,
        220,
        0.08,
        12,
        true
    );
}

rope=
new THREE.Mesh(
    createRope(0),
    ropeMaterial
);

scene.add(rope);

let ropePhase=0;

let waitingJump=false;
let cycleChecked=false;

let accelEMA=9.8;

function registerJump(){

    if(waitingJump){

        score++;

        updateScore();

        waitingJump=false;
        cycleChecked=true;

        showMsg("PERFECT");
    }
}

window.addEventListener(
    "devicemotion",
    e=>{

        const a=
        e.accelerationIncludingGravity;

        if(!a) return;

        const mag=
        Math.hypot(
            a.x||0,
            a.y||0,
            a.z||0
        );

        accelEMA=
            accelEMA*0.9+
            mag*0.1;

        const impulse=
        Math.abs(
            mag-accelEMA
        );

        if(
            impulse>3
        ){
            registerJump();
        }

    },
    true
);

function animate(){

    requestAnimationFrame(
        animate
    );

    ropePhase+=0.05;

    rope.geometry.dispose();

    rope.geometry=
    createRope(
        ropePhase
    );

    const nearFeet=
    Math.cos(
        ropePhase
    )>0.97;

    if(
        nearFeet &&
        !cycleChecked
    ){
        waitingJump=true;
    }

    if(!nearFeet){

        if(waitingJump){

            score=0;

            updateScore();

            showMsg("MISS");

            waitingJump=false;
        }

        cycleChecked=false;
    }

    renderer.render(
        scene,
        camera
    );
}

updateScore();
animate();

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect=
        window.innerWidth/
        window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

</script>

</body>
  </html>
