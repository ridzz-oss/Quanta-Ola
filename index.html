<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TXT to Video</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --card: #171a21;
      --text: #eef2ff;
      --muted: #a6adbb;
      --border: #2a3040;
      --button: #4f7cff;
      --button2: #2b3242;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1a1f2d 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .wrap {
      width: min(900px, 100%);
      background: rgba(23, 26, 33, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0 0 16px; color: var(--muted); }
    textarea {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #0e1118;
      color: var(--text);
      padding: 14px;
      outline: none;
      font-size: 15px;
      line-height: 1.5;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button, a.btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
    }
    button.primary, a.primary { background: var(--button); color: white; }
    button.secondary, a.secondary { background: var(--button2); color: var(--text); }
    button:disabled { opacity: .65; cursor: not-allowed; }
    .status { margin-top: 12px; color: var(--muted); min-height: 24px; }
    video {
      width: 100%;
      margin-top: 16px;
      border-radius: 16px;
      background: #050608;
      border: 1px solid var(--border);
      display: none;
    }
    .small { font-size: 13px; color: var(--muted); margin-top: 10px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>TXT to Video</h1>
    <p>Masukkan prompt, tunggu hasil video, lalu download.</p>

    <textarea id="prompt" placeholder="Contoh: A pixel-art queen, standing in her grand pixelated throne room, with a sunbeam casting light onto her flowing cape."></textarea>

    <div class="row">
      <button id="generate" class="primary">Generate Video</button>
      <a id="download" class="secondary" href="#" download style="display:none;">Download Video</a>
    </div>

    <div id="status" class="status"></div>
    <video id="player" controls playsinline></video>
    <div class="small">Kalau video sudah keluar, tombol download akan aktif otomatis.</div>
  </main>

<script>
  const promptEl = document.getElementById('prompt');
  const generateBtn = document.getElementById('generate');
  const downloadBtn = document.getElementById('download');
  const statusEl = document.getElementById('status');
  const player = document.getElementById('player');

  generateBtn.addEventListener('click', async () => {
    const prompt = promptEl.value.trim();

    if (!prompt) {
      statusEl.textContent = 'Prompt tidak boleh kosong.';
      return;
    }

    generateBtn.disabled = true;
    downloadBtn.style.display = 'none';
    player.style.display = 'none';
    statusEl.textContent = 'Sedang membuat video...';

    try {
      const response = await fetch('/api/txt2video', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          prompt: prompt
        })
      });

      const data = await response.json();

      if (!response.ok || !data.ok) {
        throw new Error(data.error || 'Gagal membuat video');
      }

      player.src = data.url;
      player.style.display = 'block';
      downloadBtn.href = data.url;
      downloadBtn.style.display = 'inline-flex';
      statusEl.textContent = 'Video siap.';
    } catch (error) {
      statusEl.textContent = 'Error: ' + error.message;
    } finally {
      generateBtn.disabled = false;
    }
  });
</script>
</body>
</html>
