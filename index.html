<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test DeviceMotion</title>

<style>
body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    max-width:300px;
}

button{
    margin-top:10px;
    padding:8px 15px;
}
</style>
</head>
<body>

<h1 id="status">Loading...</h1>

<div id="popup">
    <div class="box">
        <h2>Hasil Tes</h2>
        <p id="result"></p>
        <button onclick="popup.style.display='none'">
            OK
        </button>
    </div>
</div>

<script>

const status = document.getElementById("status");
const result = document.getElementById("result");

result.innerText =
"Menunggu data sensor...";

window.addEventListener(
"devicemotion",
e => {

    const a =
    e.accelerationIncludingGravity;

    if(!a) return;

    const text =
    `X: ${(a.x||0).toFixed(2)}
Y: ${(a.y||0).toFixed(2)}
Z: ${(a.z||0).toFixed(2)}`;

    status.innerText = text;
    result.innerText = text;

});

    </script>

</body>
</html>
