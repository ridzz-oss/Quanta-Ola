<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test DeviceMotion</title>

<style>
body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    max-width:300px;
}

button{
    margin-top:10px;
    padding:8px 15px;
}
</style>
</head>
<body>

<h1 id="status">Loading...</h1>

<div id="popup">
    <div class="box">
        <h2>Hasil Tes</h2>
        <p id="result"></p>
        <button onclick="popup.style.display='none'">
            OK
        </button>
    </div>
</div>

<script>

const hasil =
"DeviceMotion = " +
typeof DeviceMotionEvent;

document.getElementById("status")
.innerText = hasil;

document.getElementById("result")
.innerText = hasil;

</script>

</body>
</html>
