<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pro Runner</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:#0f1115;
}

#header{
position:fixed;
top:25px;
left:0;
right:0;
height:55px;
background:#181b22;
border-bottom:1px solid #333;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
z-index:99999;
}

#title{
color:white;
font-weight:bold;
font-size:16px;
}

#menu{
display:flex;
gap:6px;
}

.btn{
width:40px;
height:35px;
border:none;
border-radius:8px;
background:#252a35;
color:white;
cursor:pointer;
}

.cr-group{
display:flex;
align-items:center;
background:#252a35;
border-radius:8px;
overflow:hidden;
height:35px;
}

.cr-btn{
width:40px;
height:35px;
border:none;
background:transparent;
color:white;
cursor:pointer;
color:white;
}

.cr-divider{
width:1px;
height:18px;
background:#4b5568;
}

#content{
position:fixed;
top:80px;
left:0;
right:0;
bottom:0;
}

#editor{
width:100%;
height:100%;
background:#111;
color:white;
border:none;
outline:none;
resize:none;
padding:12px;
font-family:monospace;
font-size:14px;
}

#preview{
width:100%;
height:100%;
border:none;
display:none;
background:white;
}

#floatingDot{
position:fixed;
left:20px;
top:100px;
width:50px;
height:50px;
border-radius:50%;
background:rgba(0,0,0,.7);
backdrop-filter:blur(8px);
color:white;
font-size:34px;
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:999999;
user-select:none;
}

#floatingMenu{
position:fixed;
left:80px;
top:100px;
background:#181b22;
border-radius:12px;
padding:8px;
display:none;
opacity:0;
transform:scale(.8);
transition:.2s;
z-index:999999;
}

.menu-btn{
border:none;
background:#252a35;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="header">

<div id="title">
PRO RUNNER
</div>

<div id="menu">

<button class="btn" onclick="openFile()">
<i class="fas fa-upload"></i>
</button>

<div class="cr-group">

<button class="cr-btn" onclick="showCode()">
<i class="fas fa-code"></i>
</button>

<div class="cr-divider"></div>

<button class="cr-btn" onclick="runCode()">
<i class="fas fa-play"></i>
</button>

</div>

</div>

</div>

<input
id="fileInput"
type="file"
accept=".html"
style="display:none">

<div id="content">

<textarea id="editor"
placeholder="Tempel kode HTML di sini..."></textarea>

<iframe id="preview"></iframe>

</div>

<div id="floatingDot">•</div>

<div id="floatingMenu">
<button class="menu-btn" id="backCodeBtn">
<i class="fas fa-code"></i> Code
</button>
</div>

<script>

const editor=document.getElementById("editor");
const preview=document.getElementById("preview");
const header=document.getElementById("header");

const floatingDot=document.getElementById("floatingDot");
const floatingMenu=document.getElementById("floatingMenu");

function showCode(){

editor.style.display="block";
preview.style.display="none";

}

function runCode(){

let code=editor.value.trim();

if(code===""){
alert("Masukkan kode dulu");
return;
}

header.style.display="none";

editor.style.display="none";
preview.style.display="block";

preview.srcdoc=code;

floatingDot.style.display="flex";

}

document
.getElementById("backCodeBtn")
.onclick=function(){

preview.style.display="none";
editor.style.display="block";

header.style.display="flex";

floatingDot.style.display="none";
floatingMenu.style.display="none";

};

floatingDot.onclick=function(){

if(floatingMenu.style.display==="block"){

floatingMenu.style.opacity="0";
floatingMenu.style.transform="scale(.8)";

setTimeout(()=>{
floatingMenu.style.display="none";
},200);

}else{

floatingMenu.style.display="block";

setTimeout(()=>{
floatingMenu.style.opacity="1";
floatingMenu.style.transform="scale(1)";
},10);

}

};

let dragging=false;
let moved=false;
let startX=0;
let startY=0;
let offsetX=0;
let offsetY=0;

floatingDot.addEventListener("touchstart",e=>{

dragging=true;
moved=false;

startX=e.touches[0].clientX;
startY=e.touches[0].clientY;

offsetX=startX-floatingDot.offsetLeft;
offsetY=startY-floatingDot.offsetTop;

});

floatingDot.addEventListener("touchmove",e=>{

if(!dragging)return;

let x=e.touches[0].clientX-offsetX;
let y=e.touches[0].clientY-offsetY;

if(
Math.abs(e.touches[0].clientX-startX)>5 ||
Math.abs(e.touches[0].clientY-startY)>5
){
moved=true;
}

floatingDot.style.left=x+"px";
floatingDot.style.top=y+"px";

floatingMenu.style.left=(x+60)+"px";
floatingMenu.style.top=y+"px";

});

floatingDot.addEventListener("touchend",()=>{

dragging=false;

});

const fileInput=
document.getElementById("fileInput");

function openFile(){
fileInput.click();
}

fileInput.addEventListener("change",function(e){

let file=e.target.files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=function(ev){

editor.value=ev.target.result;

};

reader.readAsText(file);

});

</script>

</body>
    </html>
